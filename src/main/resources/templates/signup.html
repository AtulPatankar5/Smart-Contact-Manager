<!DOCTYPE html>
<html lang="en" xmlns="http://www.thymeleaf.org"
	th:replace="base::layout(~{::section})">
<head>
<title>Sign Up Page</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
</head>
<body>
	<section>
		<div class="container">
			<div class="row">
				<div class="col-md-6 offset-md-3 mt-3">

					<div class="my-card">

						<div th:if="${session.message}"
							th:classappend="${session.message.type}"
							class="alert alert-primary" role="alert">
							<p th:text="${session.message.content}" class="text-center"></p>
						</div>
						<div class="form-header">
							<img th:src="@{/../image/register.png}" class="register-icon"
								alt="" />
							<h1 class="text-center">Register here</h1>
						</div>

						<form novalidate th:action="@{/register}" method="post"
							class="form-data" th:object="${user}">
							<div class="form-group">

								<label for="name">Name</label> <input type="text"
									class="form-control"
									th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
									id="name" placeholder="Enter Name" required th:field="*{name}">

								<div class="invalid-feedback"
									th:each="e : ${#fields.errors('name')}" th:text="${e}"></div>

							</div>
							<div class="form-group">
								<label for="email">Email</label> <input type="text"
									class="form-control" id="email" placeholder="Enter email"
									required th:field="*{email}">
							</div>

							<div class="form-group">
								<label for="password">Password</label> <input type="password"
									class="form-control" id="password" placeholder="Enter password"
									required th:field="*{password}">
							</div>

							<div class="form-group">
								<label for="about">About</label>
								<textarea name="about" id="about"
									placeholder="Enter Something youself" class="form-control"
									cols="30" rows="5" th:field="*{about}"></textarea>
							</div>

							<div class="form-group form-check">
								<input type="checkbox" name='agreement'
									class="form-check-input form-checkbox" id="agreement" /> <label
									for="agreement" class="form-checkbox"> Accept Terms and
									Condition</label>
							</div>

							<div class="d-flex justify-content-center gap-3 mt-3">
								<button class="btn btn-primary text-white bg-theme btn-block"
									type="submit">Sign Up</button>
								<button class="btn btn-warning btn-block" type="button">Reset</button>
							</div>


						</form>
					</div>
				</div>
			</div>
		</div>
	</section>
</body>
</html>
