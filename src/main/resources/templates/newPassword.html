<!DOCTYPE html>
<html lang="en" xmlns="http://thymeleaf.org" th:replace="base::layout(~{::section})">
<head>
    <meta charset="ISO-8859-1">
    <title>Set New password</title>
</head>
<body>
<section>
    <div id="login">
        <div class="container">
            <div id="login-row"
                 class="row justify-content-center align-items-center gap-4">
                <div id="login-column" class="col-md-6">
                    <div id="login-box" class="col-md-12">
                        <div th:if="${message}"
                             th:class="'alert alert-' + ${message.type}">
                            <span th:text="${message.content}"></span>
                        </div>
                        <h3 class="text-center m-2">Set New Password </h3>
                        <form th:action="@{/setNewPassword}" method="post">

                            <div class="form-group my-5">
                                <h3 class="text-center m-2">User is : <span th:text="${email}"></span></h3>
                            </div>
                            <div class="form-group my-5">
                                <input type="text" name="newPassword" id="newPassword" required
                                       placeholder="Enter New password Here.." class="form-control">

                            </div>
                            <div class="container text-center my-5">
                                <button type="submit" class="btn btn-success">Change Password</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
