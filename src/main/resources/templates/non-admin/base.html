<!doctype html>
<html lang="en" xmlns="http://thymeleaf.org"
	th:fragment="layout(content)">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title th:text="${title}">Smart Contact Manager</title>
<link rel="stylesheet" href="" th:href="@{/css/style.css}" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
	integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
	crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
	<nav class="fixed-top navbar navbar-expand-lg navbar-dark bg-theme">
		<div class="container-fluid">

			<a class="navbar-brand" th:href="@{/}"> Smart Contact Manager </a>

			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="navbarSupportedContent">

				<ul class="navbar-nav ms-auto align-items-center text-uppercase">

					<li class="nav-item"><a class="nav-link active" th:href="@{/}">
							Home </a></li>

					<li class="nav-item"><a class="nav-link" href="#"> <span
							th:text="${user.name}"></span>
					</a></li>

					<li class="nav-item">
						<form th:action="@{/logout}" method="post" class="m-0">
							<button type="submit"
								class="btn btn-link nav-link text-white text-decoration-none p-0">
								Logout</button>
						</form>
					</li>

				</ul>

			</div>

		</div>
	</nav>

	<div class="sidebar mt-4">
		<span class="cross-btn" onclick="togglesidebar()">&times;</span> <a
			th:href="@{/user/index}" href="" class="item"><i
			class="fas fa-home"></i>Home</a> <a th:href="@{/user/view-contacts/1}"
			href="" class="item"> <i class="fas fa-id-badge"></i>View
			Contacts
		</a> <a th:href="@{/user/add-contact}" href="" class="item"><i
			class="fas fa-user-plus"></i>Add Contact</a> 
			<a th:href="@{/user/profile}" href="" class="item"><i
			class="fas fa-user-circle"></i>Your Profile</a> <a href="" class="item"><i
			class="fas fa-wrench"></i>Settings</a>
	</div>

	<div class="content mt-5">
		<i class="fas fa-bars m-3" onclick="togglesidebar()"></i>

		<!-- 	message Box -->
		<div class="container">
			<div th:if="${message}" class="alert text-center"
				th:classappend="${'alert-' + message.type}">
				<span th:text="${message.content}"></span>
			</div>
		</div>


		<div th:replace="${content}"></div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>

	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="" th:src="@{/js/script.js}"></script>
	<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
	<script>
	function deleteContact(cid) {
	    swal({
	        title: "Are you sure?",
	        text: "You want to delete this contact?",
	        icon: "warning",
	        buttons: true,
	        dangerMode: true,
	    }).then((willDelete) => {

	        if (willDelete) {

	            swal({
	                title: "Success!",
	                text: "Your contact will be deleted.",
	                icon: "success",
	                buttons: false
	            });

	            setTimeout(() => {
	                window.location.href = "/user/delete-contact/" + cid;
	            }, 2000);

	        } else {
	            swal("Your contact is safe!");
	        }
	    });
	}
	</script>
</body>
</html>
