<!doctype html>
<html lang="en" xmlns="http://thymeleaf.org"
	th:fragment="layout(content)">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title th:text="${title}">Smart Contact Manager</title>
<link rel="stylesheet" href="" th:href="@{/css/style.css}" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
	integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
	crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
	<nav class="fixed-top navbar navbar-expand-lg bg-theme">
		<div class="container-fluid">
			<a class="navbar-brand" href="#">Smart Contact Manager</a>
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
				aria-controls="navbarSupportedContent" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarSupportedContent">
				<ul class="navbar-nav ms-auto mb-2 mb-lg-0 text-uppercase">
					<li class="nav-item"><a class="nav-link active"
						aria-current="page" th:href="@{/}"> Home</a></li>
					<li class="nav-item"><a class="nav-link"><span
							th:text="${user.name}"></span></a></li>

					<form th:action="@{/logout}" method="post" class="d-inline">
						<button type="submit" class="btn btn-link nav-link border-0 p-0">
							Logout</button>
					</form>

				</ul>
			</div>
		</div>
	</nav>

	<div class="sidebar mt-4">
		<span class="cross-btn" onclick="togglesidebar()">&times;</span> <a
			th:href="@{/user/index}" href="" class="item"><i
			class="fas fa-home"></i>Home</a> <a href="" class="item"> <i
			class="fas fa-id-badge"></i>View Contacts
		</a> <a th:href="@{/user/add-contact}" href="" class="item"><i
			class="fas fa-user-plus"></i>Add Contact</a> <a href="" class="item"><i
			class="fas fa-user-circle"></i>Your Profile</a> <a href="" class="item"><i
			class="fas fa-wrench"></i>Settings</a>
	</div>

	<div class="content mt-5">
		<i class="fas fa-bars m-3" onclick="togglesidebar()"></i>

		<!-- 	message Box -->
		<div class="container">
			<div th:if="${message}" class="alert text-center"
				th:classappend="${'alert-' + message.type}">
				<span th:text="${message.content}"></span>
			</div>
		</div>


		<div th:replace="${content}"></div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>

	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="" th:src="@{/js/script.js}"></script>
</body>
</html>
