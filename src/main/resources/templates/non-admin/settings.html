<!DOCTYPE html>
<html lang="en" xmlns="http://thymeleaf.org"
      th:replace="non-admin/base::layout(~{::section})">
<head>
    <meta charset="ISO-8859-1">
    <title>Settings Page</title>
</head>
<body>
<section>
    <div class="container text-center d-flex justify-content-center">

        <div class="card-body bg-white">

            <div class="container">
                <div class="row">
                    <div class="col-md-12">
                        <div class="card border-0 bg-white text-center w-auto h-auto">
                            <div class="card-body">
                                <h1 class="py-4">Change password</h1>
                                <form th:action="@{/user/changepassword}" method="post" action="" class="d-flex flex-column gap-4">
                                    <div class="form-group">
                                        <input  name="oldpassword" type="text" class="form-control" placeholder="Enter old password">
                                    </div>
                                    <div class="form-group">
                                        <input type="text" name="newpassword" class="form-control" placeholder="Enter new password">
                                    </div>
                                    <div class="container d-flex gap-2 align-items-center">
                                        <button type="reset" class="btn btn-warning w-50">Reset</button>
                                        <button type="submit" class="btn btn-success w-50">Change</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</section>
</body>
</html>
