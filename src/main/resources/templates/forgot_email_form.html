<!DOCTYPE html>
<html lang="en" xmlns="http://thymeleaf.org" th:replace="base::layout(~{::section})">
<head>
    <meta charset="ISO-8859-1">
    <title>Forgot Password Page</title>
</head>
<body>
<section>
    <div id="login">
        <div class="container">
            <div id="login-row"
                 class="row justify-content-center align-items-center gap-4">
                <div id="login-column" class="col-md-6">
                    <div id="login-box" class="col-md-12">
                        <div th:if="${message}"
                             th:class="'alert alert-' + ${message.type}">
                            <span th:text="${message.content}"></span>
                        </div>
                        <h3 class="text-center m-2">Enter your Registered Email </h3>
                        <form th:action="@{/sendOtp}" method="post" >

                            <div class="form-group my-5">
                                <input type="email" name="email_id" id="email_id" required placeholder="Enter Email Here.." class="form-control">

                            </div>
                            <div class="container text-center my-5">
                                <button type="submit" class="btn btn-warning">SEND OTP</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
